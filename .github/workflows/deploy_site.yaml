name: Deploy Site
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yaml'
      - 'identity/**'
      - '.github/workflows/deploy_site.yaml'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --frozen
      - run: bash scripts/web_preprocessing.sh
      - run: uv run mkdocs build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
