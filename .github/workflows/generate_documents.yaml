name: Generate and Release Documents

on:
  push:
    paths:
      - 'docs/6-pali-class/**'
  workflow_dispatch:

jobs:
  generate-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch printer.py from dpd-db-sbs
        run: |
          rm -f tools/printer.py
          curl -fsSL "https://raw.githubusercontent.com/sasanarakkha/dpd-db-sbs/main/tools/printer.py" -o tools/printer.py

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 pandoc

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Generate PDFs
        run: uv run python scripts/generate_pdfs.py

      # - name: Generate DOCX files
      #   run: uv run python scripts/generate_docx.py

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          echo "Latest release tag: $LATEST_TAG"

          HAS_PDFS=$(gh release view "$LATEST_TAG" --json assets \
            -q '[.assets[].name | select(endswith(".pdf"))] | length > 0')

          if [ "$HAS_PDFS" = "true" ]; then
            echo "Latest release already has PDF assets — creating new release"
            NEW_TAG="artifacts-$(date +'%d.%m.%Y_%H-%M-%S')"
            gh release create "$NEW_TAG" \
              --title "Build $(date +'%d.%m.%Y %H:%M UTC')" \
              --notes "PDF documents generated from latest Pāli class source files." \
              output/pdf/*.pdf
          else
            echo "Appending PDFs to existing release: $LATEST_TAG"
            gh release upload "$LATEST_TAG" output/pdf/*.pdf
          fi
